<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bonzo poemas aleatorios - móvil</title>
<style>
body {
  background-color: black;
  color: white;
  font-family: "helvetica neue", helvetica, arial, sans-serif;
  font-size: 0.85rem; /* ~15% más pequeño */
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  height: 100vh;
  margin: 0;
  cursor: pointer;
}
#poema {
  width: 90%;
  max-width: 700px;
  text-align: left;
  white-space: pre-line;
}
#poema div {
  margin: 0;
}
.aparece {
  animation: fadeinup 1.6s ease;
}
.desaparece {
  animation: fadeout 3.2s ease;
}
.palabra-separada {
  display: inline-block;
  animation: separar 0.6s ease-out;
}
@keyframes fadeinup {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeout {
  from { opacity: 1; }
  to   { opacity: 0; }
}
@keyframes separar {
  0%   { transform: translateX(0);   opacity: 0.7; }
  40%  { transform: translateX(4px); opacity: 1;   }
  100% { transform: translateX(0);   opacity: 1;   }
}
</style>
</head>
<body onclick="agregarverso()">
<div id="poema"></div>

<script>
// detectar si es móvil (aproximado por ancho de ventana)
const esMovil = window.innerWidth <= 768;

// versos
const versos = [
  "conquistar territorios de luz con los dedos",
  "el paisaje se quema como se quema un libro viejo",
  "las ciudades se incendian como se incendian los ríos montañas y lares",
  "los recuerdos se inmolan como se inmolan las manos puestas al sol en medio del desierto",
  "desaparecer de un lugar no habitado no representa ningún síntoma de rebeldía",
  "escribir sin ningún sentido",
  "nadie lee fuego mientras todo se está quemando",
  "no hay poemas para la ausencia del tacto",
  "achicharrados los huesos se pelan con la fricción de la indiferencia",
  "deja el frío de las costras blandas",
  "las flamas al contacto con todo cuerpo uniforme se suman a la resistencia guerrillera de la muerte",
  "nadie quiere enfrentarse al dolor de la desaparición del propio cuerpo",
  "perderse",
  "mirar a los ojos mientras los ojos se queman",
  "tronar el silencio perdido",
  "pienso en los sueños azules que nunca recordaré",
  "pienso en mis manos tocando cuerpos extraños",
  "pienso en el sudor de otras frentes",
  "pienso en mis piernas estrujando sus bordes",
  "pienso en el poder y en el resentimiento",
  "cada voz es un incendio una contradicción",
  "una bocanada de sal que cicatriza y diluye",
  "cada palabra es una tormenta que seca los trópicos los quema, los mata",
  "el lenguaje es un desierto de fuego",
  "reventada la carne a quemarropa",
  "habrá que demoler todo recuerdo de un cuerpo intacto",
  "habrá que saquear las cavernas de un templo hecho ceniza hoguera y tez",
  "habrá que incendiar todo rastro de amor",
  "habrá que morir en silencio",
  "las palabras no sufren ni sangran ni palpan están ahí como un objeto, como el fuego",
  "el cuerpo muere para convertirse en eso que no siente",
  "el cuerpo está hecho para morir es un objeto, un arma",
  "gritan las grietas de la carne cuando suena el olor a tierra mojada con bencina",
  "el fuego cocina lentamente mi determinación marcial",
  "arden las hilachas los gajos los órganos como una quema de pastizales",
  "estallan como espigas entre los músculos extendidos",
  "entre los huesos de mi cráneo troquelado explotan los poros de la piel",
  "espera en silencio las gotas de sudor",
  "el caldo de recuerdos no vale nada",
  "en las yemas de los dedos puede arder un sol",
  "morir es una posibilidad del lenguaje",
  "una fogata que ilumine el silencio",
  "quemaré mi cuerpo con monedas con billetes con papeles de un vacío irrenunciable",
  "construir una ciudad que explote todo el tiempo",
  "estallar sólo con un fin didáctico como un profesor que exhibe su muerte para enseñarle a una estrella a dar luz"
];

// interlineados: en móvil el mínimo es 1
const lineheightsDesktop = [0.25, 1.25, 2.25, 4.25, 7.25];
const lineheightsMobile  = [1.0, 1.25, 2.25, 4.25, 7.25];
const lineheights = esMovil ? lineheightsMobile : lineheightsDesktop;

// mezclar versos
let versosmezclados = [...versos];
for (let i = versosmezclados.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [versosmezclados[i], versosmezclados[j]] = [versosmezclados[j], versosmezclados[i]];
}

let indiceactual = 0;
let versosvisibles = 0;
const max_versos_visibles = 6;
const duracion_desaparecer = 3200;
let bloqueado = false;

// intervalos 4, 6, 2, 3, 5 en ciclo
const intervalos = [4, 6, 2, 3, 5];
let indiceintervalo = 0;
let restante_para_animar = intervalos[indiceintervalo];

function siguienteintervalo() {
  indiceintervalo = (indiceintervalo + 1) % intervalos.length;
  restante_para_animar = intervalos[indiceintervalo];
}

// web audio + reverb
let audioCtx = null;
let reverbBuffer = null;
let reverbCargando = false;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (!reverbBuffer && !reverbCargando) {
    reverbCargando = true;
    fetch("https://cdn.freesound.org/previews/415/415209_5121236-lq.mp3")
      .then(r => r.arrayBuffer())
      .then(b => audioCtx.decodeAudioData(b))
      .then(decoded => {
        reverbBuffer = decoded;
      })
      .catch(() => {
        // si falla la reverb, simplemente no se usa
      });
  }
}

// activar audio en el primer click
window.addEventListener("click", () => {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}, { once: true });

// notas graves + medias
const notas = [110.0, 130.8, 164.8, 185.0, 440.0, 523.25];

function reproducirsonido() {
  if (!audioCtx) {
    initAudio();
  }
  if (!audioCtx) return;

  const freq = notas[Math.floor(Math.random() * notas.length)];

  const osc = audioCtx.createOscillator();
  const masterGain = audioCtx.createGain();
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

  // volumen ~50% más fuerte que la versión anterior
  masterGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.375, audioCtx.currentTime + 0.05);
  masterGain.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + 0.7);

  dryGain.gain.value = 0.18;
  wetGain.gain.value = 0.8;

  osc.connect(masterGain);
  masterGain.connect(dryGain);
  dryGain.connect(audioCtx.destination);

  if (reverbBuffer) {
    const convolver = audioCtx.createConvolver();
    convolver.buffer = reverbBuffer;
    masterGain.connect(convolver);
    convolver.connect(wetGain);
    wetGain.connect(audioCtx.destination);
  }

  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.7);
}

function crearversodiv(texto, debeanimar) {
  const div = document.createElement("div");
  const palabras = texto.split(" ");
  let partes = [];

  if (debeanimar) {
    const posibles = [2, 5, 20].filter(i => i < palabras.length);
    let idx = null;
    if (posibles.length > 0) {
      idx = posibles[Math.floor(Math.random() * posibles.length)];
    }
    const cantidad = Math.floor(Math.random() * (12 - 7 + 1)) + 7;
    const espacios = "&nbsp;".repeat(cantidad);

    for (let i = 0; i < palabras.length; i++) {
      if (i === idx) {
        partes.push(espacios + "<span class='palabra-separada'>" + palabras[i] + "</span>");
      } else {
        partes.push(palabras[i]);
      }
    }
  } else {
    partes = palabras;
  }

  div.innerHTML = partes.join(" ");
  div.style.lineHeight = lineheights[Math.floor(Math.random() * lineheights.length)];
  div.classList.add("aparece");
  return div;
}

let contadorglobal = 0;

window.onload = () => {
  const poema = document.getElementById("poema");
  const verso = versosmezclados[0];
  indiceactual = 1;
  versosvisibles = 1;
  contadorglobal = 1;
  restante_para_animar -= 1;
  let debe = false;
  if (restante_para_animar === 0) {
    debe = true;
    siguienteintervalo();
  }
  poema.appendChild(crearversodiv(verso, debe));
  reproducirsonido();
};

function agregarverso() {
  if (bloqueado) return;
  const poema = document.getElementById("poema");
  if (indiceactual >= versosmezclados.length) return;

  if (versosvisibles >= max_versos_visibles) {
    bloqueado = true;
    poema.classList.add("desaparece");
    const verso = versosmezclados[indiceactual];
    indiceactual++;
    versosvisibles = 0;

    setTimeout(() => {
      poema.innerHTML = "";
      poema.classList.remove("desaparece");
      versosvisibles = 1;
      contadorglobal++;
      restante_para_animar--;
      let debe = false;
      if (restante_para_animar === 0) {
        debe = true;
        siguienteintervalo();
      }
      poema.appendChild(crearversodiv(verso, debe));
      reproducirsonido();
      bloqueado = false;
    }, duracion_desaparecer);
    return;
  }

  const verso = versosmezclados[indiceactual];
  indiceactual++;
  versosvisibles++;
  contadorglobal++;
  restante_para_animar--;
  let debe = false;
  if (restante_para_animar === 0) {
    debe = true;
    siguienteintervalo();
  }
  poema.appendChild(crearversodiv(verso, debe));
  reproducirsonido();
}
</script>
</body>
</html>
